name: Build and Deploy to S3 + CloudFront (production)

# Builds the static export (`next build` → `out/`) and deploys it to S3,
# then invalidates CloudFront. Uses GitHub OIDC to assume an AWS IAM role
# (no long-lived AWS keys). See:
# https://aws.amazon.com/blogs/security/use-iam-roles-to-connect-github-actions-to-actions-in-aws/
#
# Required repository configuration (Settings → Secrets and variables → Actions → Variables):
#   AWS_REGION                  e.g. ap-southeast-1
#   AWS_ROLE_ARN                arn:aws:iam::<account-id>:role/<github-oidc-role>
#   S3_BUCKET                   e.g. quy.io.vn
#   CLOUDFRONT_DISTRIBUTION_ID  e.g. E3XXXXXXXXXXXX

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs

# Needed for GitHub's OIDC token used by configure-aws-credentials.
permissions:
  id-token: write
  contents: read

# Avoid overlapping deploys.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    env:
      NEXTJS_DIST: out
      AWS_REGION: ${{ vars.AWS_REGION }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      # Public Mapbox token for the Route Tracker (client-side; scope it by URL in Mapbox).
      NEXT_PUBLIC_MAPBOX_TOKEN: ${{ vars.NEXT_PUBLIC_MAPBOX_TOKEN }}
      # Firebase web config (publishable client values).
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
      NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${{ vars.NEXT_PUBLIC_FIREBASE_DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      # 1) Hashed/immutable assets — long cache. --delete removes stale files.
      - name: Sync immutable assets to S3
        run: |
          aws s3 sync "${NEXTJS_DIST}" "s3://${S3_BUCKET}" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.txt" \
            --exclude "sw.js" \
            --exclude "manifest.webmanifest"

      # 2) HTML / service worker / manifest — must always revalidate so updates
      #    are picked up immediately after an invalidation.
      - name: Sync revalidate-always files to S3
        run: |
          aws s3 sync "${NEXTJS_DIST}" "s3://${S3_BUCKET}" \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.txt" \
            --include "sw.js" \
            --include "manifest.webmanifest"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
